<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>质检结果可视化分析平台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats-panel { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>质检数据概览</h1>
    <button onclick="runAnalysis()">执行总体分析</button>
    <div id="stats" class="stats-panel" style="display:none;">
        <h3>统计概览</h3>
        <p id="avg-score">正在分析...</p>
        <canvas id="mainChart" style="max-height: 300px;"></canvas>
    </div>
    <div class="grid" id="data-grid"></div>
    <script>
        const data = {
            "images_data/1.jpg": {"caption_v1": "这是一只猫", "caption_v2": "这是一只狗", "result_v1": {"score": 1, "acc": 0.3}, "result_v2": {"score": 2, "acc": 0.3}},
            "images_data/2.jpg": {"caption_v1": "这是一只猫", "caption_v2": "这是一只狗", "result_v1": {"score": 1, "acc": 0.3}, "result_v2": {"score": 2, "acc": 0.3}},
            "images_data/3.jpg": {"caption_v1": "这是一只猫", "caption_v2": "这是一只狗", "result_v1": {"score": 1, "acc": 0.3}, "result_v2": {"score": 2, "acc": 0.3}}
        };
        const grid = document.getElementById("data-grid");
        Object.keys(data).forEach(key => {
            const item = data[key];
            grid.innerHTML += `<div class="card">
                <h4>${key}</h4>
                <p><strong>V1:</strong> ${item.caption_v1} (Score: ${item.result_v1.score})</p>
                <p><strong>V2:</strong> ${item.caption_v2} (Score: ${item.result_v2.score})</p>
            </div>`;
        });
        function runAnalysis() {
            document.getElementById("stats").style.display = "block";
            const keys = Object.keys(data);
            const scores1 = keys.map(i => data[i].result_v1.score);
            const scores2 = keys.map(i => data[i].result_v2.score);
            const avg1 = scores1.reduce((a,b)=>a+b)/scores1.length;
            const avg2 = scores2.reduce((a,b)=>a+b)/scores2.length;
            document.getElementById("avg-score").innerText = `V1 平均分: ${avg1.toFixed(2)} | V2 平均分: ${avg2.toFixed(2)}`;
            new Chart(document.getElementById("mainChart"), {
                type: "bar",
                data: {
                    labels: keys,
                    datasets: [{label: "V1 Score", data: scores1, backgroundColor: "#007bff"}, {label: "V2 Score", data: scores2, backgroundColor: "#ffc107"}]
                }
            });
        }
    </script>
</body>
</html>
