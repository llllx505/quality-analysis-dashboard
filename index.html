<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>质检可视化分析平台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .controls { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>质检数据可视化</h1>
    <div class="controls">
        <label>选择 JSON 数据文件：</label>
        <input type="file" id="fileInput" accept=".json">
        <button onclick="processFile()">分析数据</button>
    </div>
    <div id="stats" style="display:none; background:white; padding:20px; border-radius:8px; margin-bottom:20px;">
        <canvas id="mainChart"></canvas>
    </div>
    <div class="grid" id="data-grid"></div>

    <script>
        function processFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("请先选择文件！");
            const reader = new FileReader();
            reader.onload = e => render(JSON.parse(e.target.result));
            reader.readAsText(file);
        }

        function render(data) {
            const grid = document.getElementById("data-grid");
            const stats = document.getElementById("stats");
            grid.innerHTML = "";
            stats.style.display = "block";

            const keys = Object.keys(data);
            keys.forEach(k => {
                grid.innerHTML += `<div class="card">
                    <h4>${k}</h4>
                    <p>V1: ${data[k].caption_v1} (Score: ${data[k].result_v1.score})</p>
                    <p>V2: ${data[k].caption_v2} (Score: ${data[k].result_v2.score})</p>
                </div>`;
            });

            new Chart(document.getElementById("mainChart"), {
                type: "bar",
                data: {
                    labels: keys,
                    datasets: [{label: "V1 Score", data: keys.map(k=>data[k].result_v1.score), backgroundColor: "#007bff"},
                               {label: "V2 Score", data: keys.map(k=>data[k].result_v2.score), backgroundColor: "#ffc107"}]
                }
            });
        }
    </script>
</body>
</html>
