<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>质检性能对比分析仪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">质检模型性能对比分析</h1>
            <p class="text-gray-600">可视化展示 v1 与 v2 的差异，快速锁定退步项</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-gray-200">
            <input type="file" id="fileInput" accept=".json" class="block w-full text-sm text-gray-500">
            <button onclick="processFile()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">加载并深度分析</button>
        </div>

        <div id="dashboard" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="font-semibold mb-4">评分趋势对比</h3>
                <canvas id="mainChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="font-semibold mb-4">关键性能指标</h3>
                <div id="statsSummary" class="space-y-4"></div>
            </div>
        </div>

        <div id="tableContainer" class="mt-8 hidden bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr><th class="p-4">文件 ID</th><th class="p-4">V1 Score</th><th class="p-4">V2 Score</th><th class="p-4">状态</th></tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        function processFile() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) {
                alert("请先选择 JSON 文件！");
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    render(data);
                } catch (err) {
                    alert("JSON 解析失败，请检查文件格式：" + err.message);
                }
            };
            reader.readAsText(file);
        }

        function render(data) {
            document.getElementById("dashboard").classList.remove("hidden");
            document.getElementById("tableContainer").classList.remove("hidden");
            
            const keys = Object.keys(data);
            const scores1 = keys.map(k => data[k].result_v1 ? data[k].result_v1.score : 0);
            const scores2 = keys.map(k => data[k].result_v2 ? data[k].result_v2.score : 0);
            
            // Stats logic
            const regressions = keys.filter((k, i) => scores2[i] < scores1[i]);
            document.getElementById("statsSummary").innerHTML = \`
                <div class="p-4 bg-blue-50 rounded">V1 平均分: ${(scores1.reduce((a,b)=>a+b, 0)/scores1.length).toFixed(2)}</div>
                <div class="p-4 bg-green-50 rounded">V2 平均分: ${(scores2.reduce((a,b)=>a+b, 0)/scores2.length).toFixed(2)}</div>
                <div class="p-4 \${regressions.length > 0 ? 'bg-red-50' : 'bg-green-50'} rounded">退步项数量: \${regressions.length}</div>
            \`;

            // Table rendering
            const tbody = document.getElementById("dataTable");
            tbody.innerHTML = keys.map(k => {
                const s1 = data[k].result_v1 ? data[k].result_v1.score : 0;
                const s2 = data[k].result_v2 ? data[k].result_v2.score : 0;
                const status = s2 >= s1 ? '<span class="text-green-600 font-bold">优化</span>' : '<span class="text-red-600 font-bold">退步 ⚠️</span>';
                return \`<tr class="border-b hover:bg-gray-50"><td class="p-4">\${k}</td><td class="p-4">\${s1}</td><td class="p-4">\${s2}</td><td class="p-4">\${status}</td></tr>\`;
            }).join('');

            // Chart
            const ctx = document.getElementById("mainChart").getContext("2d");
            if (window.myChart instanceof Chart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: "line",
                data: {
                    labels: keys,
                    datasets: [{label: "V1 Score", data: scores1, borderColor: "#2563eb"}, {label: "V2 Score", data: scores2, borderColor: "#d97706"}]
                }
            });
        }
    </script>
</body>
</html>
